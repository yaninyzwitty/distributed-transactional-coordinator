syntax = "proto3";

package participant.v1;

import "google/protobuf/timestamp.proto";

enum ParticipantState {
  PARTICIPANT_STATE_UNSPECIFIED = 0;
  PARTICIPANT_STATE_PENDING = 1;
  PARTICIPANT_STATE_PREPARED = 2;
  PARTICIPANT_STATE_COMMITTED = 3;
  PARTICIPANT_STATE_ABORTED = 4;
}

message Participant {
  string transaction_id = 1;
  string participant_id = 2;
  string endpoint = 3;
  ParticipantState state = 4;
  google.protobuf.Timestamp voted_at = 5;
}

message RegisterParticipantRequest {
  string transaction_id = 1;
  string participant_id = 2;
  string endpoint = 3;
}

message GetParticipantsRequest {
  string transaction_id = 1;
}

message GetParticipantsResponse {
  repeated Participant participants = 1;
}

message UpdateParticipantStateRequest {
  string transaction_id = 1;
  string participant_id = 2;
  ParticipantState state = 3;
  google.protobuf.Timestamp voted_at = 4;
}

message RegisterParticipantResponse {}

message UpdateParticipantStateResponse {}