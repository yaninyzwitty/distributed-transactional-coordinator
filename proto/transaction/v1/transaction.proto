syntax = "proto3";

package transaction.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

enum TransactionState {
  TRANSACTION_STATE_UNSPECIFIED = 0;
  TRANSACTION_STATE_PREPARING = 1;
  TRANSACTION_STATE_PREPARED = 2;
  TRANSACTION_STATE_COMMITTING = 3;
  TRANSACTION_STATE_COMMITTED = 4;
  TRANSACTION_STATE_ABORTING = 5;
  TRANSACTION_STATE_ABORTED = 6;
}

message Transaction {
  string id = 1;
  TransactionState state = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  google.protobuf.Timestamp timeout_at = 5;
}

message CreateTransactionRequest {
  google.protobuf.Duration timeout = 1;
}

message GetTransactionRequest {
  string id = 1;
}

message UpdateTransactionStateRequest {
  string id = 1;
  TransactionState state = 2;
}

message GetExpiredTransactionsRequest {}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message GetTransactionResponse {
  Transaction transaction = 1;
}

message UpdateTransactionStateResponse {}

message GetExpiredTransactionsResponse {
  repeated Transaction transactions = 1;
}