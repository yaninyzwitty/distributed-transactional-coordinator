syntax = "proto3";

package compensation.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

enum CompensationEventType {
  COMPENSATION_EVENT_TYPE_UNSPECIFIED = 0;
  COMPENSATION_EVENT_TYPE_PREPARE_SENT = 1;
  COMPENSATION_EVENT_TYPE_VOTE_RECEIVED = 2;
  COMPENSATION_EVENT_TYPE_COMMIT_SENT = 3;
  COMPENSATION_EVENT_TYPE_ABORT_SENT = 4;
  COMPENSATION_EVENT_TYPE_COMMITTED = 5;
  COMPENSATION_EVENT_TYPE_ABORTED = 6;
}

message CompensationEvent {
  int32 id = 1;
  string transaction_id = 2;
  CompensationEventType event_type = 3;
  string participant_id = 4;
  google.protobuf.Struct payload = 5;
  google.protobuf.Timestamp created_at = 6;
}

message RecordCompensationEventRequest {
  string transaction_id = 1;
  CompensationEventType event_type = 2;
  string participant_id = 3;
  google.protobuf.Struct payload = 4;
}

message GetCompensationEventsRequest {
  string transaction_id = 1;
}

message RecordCompensationEventResponse {}

message GetCompensationEventsResponse {
  repeated CompensationEvent events = 1;
}